<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゼッケンQR(完全オフライン版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; margin: 0; }
        #video-container { position: relative; width: 100vw; height: 70vh; background: #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; border: 3px solid #0f0; border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none;
        }
        .info { padding: 20px; background: #111; height: 30vh; }
        #result-num { font-size: 1.8rem; font-weight: bold; color: #0f0; margin-bottom: 10px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" autoplay playsinline></video>
    <div class="guide"></div>
</div>

<div class="info">
    <div id="result-num">カメラ起動中...</div>
    <div id="status-msg">QRコードを中央の枠に合わせてください</div>
</div>

<canvas id="canvas"></canvas>

<!-- ライブラリ本体をここに埋め込む -->
<script>
    /* 
       ここに jsQR.js の中身（テキストすべて）を貼り付けてください。
       これにより、ネットがなくてもQR認識が動くようになります。
    */
    
    // --- ここから下に、先ほどのカメラ制御ロジックを記述 ---
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    async function start() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: 1280, height: 720 } 
            });
            video.srcObject = stream;
            document.getElementById('result-num').innerText = "スキャン待機中";
            tick();
        } catch (e) {
            alert("カメラ起動失敗: " + e.message);
        }
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = 640; canvas.height = 480;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // jsQRが読み込まれていれば実行
            if (typeof jsQR !== 'undefined') {
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                if (code && /^\d{4}$/.test(code.data)) {
                    savePhoto(code.data);
                }
            }
        }
        requestAnimationFrame(tick);
    }

    function savePhoto(num) {
        // 保存処理（前述のコードと同じ）
        console.log("Saved: " + num);
        // 連続保存防止のため一時停止などの処理をここに入れる
    }

    start();
</script>
</body>
</html>
