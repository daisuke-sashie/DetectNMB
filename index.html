<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ゼッケン読取(大会名設定版)</title>
    <script src="jsQR.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video-container { position: relative; width: 100vw; height: 60vh; background: #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info-panel { padding: 10px; background: #111; height: 40vh; border-top: 2px solid #444; box-sizing: border-box; overflow-y: auto; }
        
        /* 大会名設定エリア */
        .event-setting { display: flex; gap: 5px; margin-bottom: 10px; background: #222; padding: 8px; border-radius: 5px; }
        #event-input { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #444; background: #000; color: #fff; }
        #set-btn { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
        
        #current-event { font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        #detect-list { font-size: 2.2rem; color: #0f0; font-weight: bold; text-align: center; min-height: 2.8rem; }
        #log { font-size: 0.7rem; color: #888; text-align: left; height: 80px; overflow-y: auto; background: #000; padding: 5px; border: 1px solid #333; }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

<div id="flash"></div>
<div id="video-container">
    <video id="video" autoplay playsinline></video>
</div>

<div class="info-panel">
    <div class="event-setting">
        <input type="text" id="event-input" placeholder="大会名を入力 (例: 第1回マラソン)">
        <button id="set-btn">設定</button>
    </div>
    <div id="current-event">大会名: 未設定</div>
    <div id="detect-list">READY</div>
    <div id="log">ログ:<br></div>
</div>

<canvas id="scan-canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const scanCanvas = document.getElementById('scan-canvas');
    const scanCtx = scanCanvas.getContext('2d', { willReadFrequently: true });
    const logDiv = document.getElementById('log');
    const detectListDiv = document.getElementById('detect-list');
    const flash = document.getElementById('flash');
    
    const eventInput = document.getElementById('event-input');
    const currentEventDiv = document.getElementById('current-event');
    const setBtn = document.getElementById('set-btn');

    let eventName = "Event"; // デフォルト
    const savedLog = {};
    const COOL_DOWN_MS = 5000;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 大会名設定ボタン
    setBtn.addEventListener('click', () => {
        if (eventInput.value.trim() !== "") {
            eventName = eventInput.value.trim();
            currentEventDiv.innerText = "大会名: " + eventName;
            addLog("大会名を変更しました: " + eventName);
            // 音声制限解除を兼ねる
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
    });

    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML = `[${time}] ${msg}<br>` + logDiv.innerHTML;
    }

    function playBeep() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.stop(audioCtx.currentTime + 0.1);
    }

    // 番号のみ読み上げる
    function speakNumber(number) {
        const uttr = new SpeechSynthesisUtterance(number);
        uttr.lang = 'ja-JP';
        uttr.rate = 1.2;
        window.speechSynthesis.speak(uttr);
    }

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            video.srcObject = stream;
            requestAnimationFrame(tick);
        } catch (e) {
            addLog("カメラエラー: " + e.message);
        }
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            scanCanvas.width = video.videoWidth;
            scanCanvas.height = video.videoHeight;
            scanCtx.drawImage(video, 0, 0, scanCanvas.width, scanCanvas.height);
            const imageData = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code && /^\d{4}$/.test(code.data)) {
                const now = Date.now();
                if (now - (savedLog[code.data] || 0) > COOL_DOWN_MS) {
                    savedLog[code.data] = now;
                    handleDetection(code.data);
                }
            }
        }
        requestAnimationFrame(tick);
    }

    function handleDetection(number) {
        detectListDiv.innerText = number;
        
        // 1. 効果音
        playBeep();

        // 2. フラッシュ
        flash.style.opacity = 0.4;
        setTimeout(() => flash.style.opacity = 0, 100);

        // 3. 画像保存 (大会名＋番号＋日時)
        const d = new Date();
        const ts = d.getFullYear() + ('0' + (d.getMonth() + 1)).slice(-2) + ('0' + d.getDate()).slice(-2) + "_" +
                   ('0' + d.getHours()).slice(-2) + ('0' + d.getMinutes()).slice(-2) + ('0' + d.getSeconds()).slice(-2);
        
        const fileName = `${eventName}_${number}_${ts}.jpeg`;
        const link = document.createElement('a');
        link.download = fileName;
        link.href = scanCanvas.toDataURL('image/jpeg', 0.8);
        link.click();

        addLog(`保存: ${fileName}`);

        // 4. 音声読み上げ（番号のみ）
        speakNumber(number);
    }

    init();
</script>
</body>
</html>
