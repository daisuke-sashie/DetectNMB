<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>複数ゼッケン同時検知システム</title>
    <script src="jsQR.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video-container { position: relative; width: 100vw; height: 70vh; background: #222; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .info-panel { padding: 10px; background: #111; height: 30vh; border-top: 2px solid #444; }
        #detect-list { font-size: 1.2rem; color: #0f0; font-weight: bold; margin-bottom: 5px; min-height: 1.5rem; }
        #log { font-size: 0.75rem; color: #888; text-align: left; height: 100px; overflow-y: auto; background: #000; padding: 8px; border: 1px solid #333; }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 100; transition: opacity 0.1s; }
    </style>
</head>
<body>

<div id="flash"></div>
<div id="video-container">
    <video id="video" autoplay playsinline></video>
</div>

<div class="info-panel">
    <div id="detect-list">検知待機中...</div>
    <div id="log">ログ:<br></div>
</div>

<canvas id="scan-canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const scanCanvas = document.getElementById('scan-canvas');
    const scanCtx = scanCanvas.getContext('2d', { willReadFrequently: true });
    const logDiv = document.getElementById('log');
    const detectListDiv = document.getElementById('detect-list');
    const flash = document.getElementById('flash');

    // 重複保存を防ぐための管理用オブジェクト { 番号: 最後に保存した時間 }
    const savedLog = {};
    const COOL_DOWN_MS = 5000; // 同じ番号は5秒間再保存しない

    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML = `[${time}] ${msg}<br>` + logDiv.innerHTML;
    }

    async function init() {
        addLog("複数同時検知モード開始...");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            video.srcObject = stream;
            requestAnimationFrame(tick);
        } catch (e) {
            addLog("エラー: " + e.message);
        }
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            scanCanvas.width = video.videoWidth;
            scanCanvas.height = video.videoHeight;
            scanCtx.drawImage(video, 0, 0, scanCanvas.width, scanCanvas.height);
            
            const imageData = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
            
            // jsQRは一度に1つのQRしか返さないため、
            // 実際には映像内に複数のQRがある場合、フレームごとに異なるQRを拾う特性を利用します。
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code && /^\d{4}$/.test(code.data)) {
                const now = Date.now();
                const lastSaved = savedLog[code.data] || 0;

                // 未保存、またはクールダウン期間を過ぎている場合のみ保存
                if (now - lastSaved > COOL_DOWN_MS) {
                    executeCapture(code.data);
                    savedLog[code.data] = now;
                }
            }
        }
        requestAnimationFrame(tick);
    }

    function executeCapture(number) {
        detectListDiv.innerText = "CAPTURED: " + number;
        addLog(`★新規検知保存: ${number}`);

        // シャッターエフェクト
        flash.style.opacity = 0.5;
        setTimeout(() => flash.style.opacity = 0, 100);

        const d = new Date();
        const ts = d.getFullYear() + ('0' + (d.getMonth() + 1)).slice(-2) + ('0' + d.getDate()).slice(-2) + "_" +
                   ('0' + d.getHours()).slice(-2) + ('0' + d.getMinutes()).slice(-2) + ('0' + d.getSeconds()).slice(-2);
        
        const fileName = `${number}_${ts}.jpeg`;

        // 検知した瞬間の映像全体を保存
        const link = document.createElement('a');
        link.download = fileName;
        link.href = scanCanvas.toDataURL('image/jpeg', 0.8);
        link.click();
    }

    init();
</script>
</body>
</html>
