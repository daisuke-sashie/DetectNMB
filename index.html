<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ゼッケン読取(高精度版)</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video-container { position: relative; width: 100vw; height: 60vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 220px; border: 2px solid #0f0; box-shadow: 0 0 0 4000px rgba(0,0,0,0.6); pointer-events: none;
        }
        .controls { padding: 10px; background: #222; height: 40vh; text-align: center; }
        .zoom-slider { width: 80%; margin: 10px 0; }
        #result { font-size: 2rem; color: #0f0; font-weight: bold; margin: 5px; min-height: 2.5rem; }
        #log { font-size: 0.7rem; color: #aaa; text-align: left; height: 60px; overflow-y: auto; background: #111; padding: 5px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" autoplay playsinline></video>
    <div class="guide"></div>
</div>

<div class="controls">
    <div id="result">スキャン待機中...</div>
    <div style="font-size: 0.8rem;">ズーム調整 (ピントが合わない時に使用)</div>
    <input type="range" id="zoom" class="zoom-slider" min="1" max="5" step="0.1" value="1">
    <div id="log">ログ:<br></div>
    <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const logDiv = document.getElementById('log');
    const resultDiv = document.getElementById('result');
    const zoomInput = document.getElementById('zoom');

    let videoTrack = null;

    function addLog(msg) {
        logDiv.innerHTML = `> ${msg}<br>` + logDiv.innerHTML;
    }

    async function startCamera() {
        addLog("カメラリクエスト中...");
        try {
            // Android Chromeで高画質を優先
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                } 
            });
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
            
            // ズーム機能の有効化（対応機種のみ）
            const capabilities = videoTrack.getCapabilities();
            if (capabilities.zoom) {
                zoomInput.min = capabilities.zoom.min;
                zoomInput.max = capabilities.zoom.max;
                zoomInput.step = capabilities.zoom.step;
                zoomInput.addEventListener('input', () => {
                    videoTrack.applyConstraints({ advanced: [{ zoom: zoomInput.value }] });
                });
                addLog("ズーム機能が有効です");
            }

            addLog("スキャンループ開始");
            requestAnimationFrame(tick);
        } catch (e) {
            addLog("エラー: " + e.name + " - " + e.message);
        }
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            // 認識率を上げるため、ビデオ解像度のままスキャン
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
            });

            if (code) {
                addLog("QR検出: " + code.data);
                if (/^\d{4}$/.test(code.data)) {
                    processMatch(code.data);
                } else {
                    resultDiv.innerText = "数字4桁のみ有効";
                }
            }
        }
        requestAnimationFrame(tick);
    }

    let isSaving = false;
    function processMatch(number) {
        if (isSaving) return;
        isSaving = true;
        
        resultDiv.innerText = "【" + number + "】";
        addLog("★保存実行: " + number);

        const d = new Date();
        const ts = d.getFullYear() + ('0' + (d.getMonth() + 1)).slice(-2) + ('0' + d.getDate()).slice(-2) + "_" +
                   ('0' + d.getHours()).slice(-2) + ('0' + d.getMinutes()).slice(-2) + ('0' + d.getSeconds()).slice(-2);
        
        const fileName = `${number}_${ts}.jpeg`;
        const link = document.createElement('a');
        link.download = fileName;
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        link.click();

        // 3秒間再読み込みを防止
        setTimeout(() => { 
            isSaving = false; 
            resultDiv.innerText = "スキャン待機中...";
        }, 3000);
    }

    startCamera();
</script>
</body>
</html>
